<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Page Not Found | LegalConnect</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            /* Established Law Firm Theme Colors */
            --primary-color: #b68d40;
            --primary-light: #fdf8eb;
            --primary-dark: #8c6b32;

            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --border-color: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Background Decorative Element */
        .bg-icon {
            position: absolute;
            font-size: 50vh;
            color: rgba(182, 141, 64, 0.04);
            z-index: 0;
            transform: rotate(-15deg);
            pointer-events: none;
        }

        /* 404 Container */
        .error-container {
            background: var(--card-bg);
            padding: 60px 50px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            text-align: center;
            max-width: 550px;
            width: 90%;
            position: relative;
            z-index: 1;
            animation: slideUpFade 0.6s ease-out forwards;
        }

        @keyframes slideUpFade {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Icon Animation */
        .error-icon-wrapper {
            width: 100px;
            height: 100px;
            background: var(--primary-light);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 25px auto;
            border: 2px dashed var(--primary-color);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(182, 141, 64, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(182, 141, 64, 0); }
            100% { box-shadow: 0 0 0 0 rgba(182, 141, 64, 0); }
        }

        .error-icon-wrapper i {
            font-size: 40px;
            color: var(--primary-color);
        }

        /* Text Styles */
        .error-code {
            font-size: 90px;
            font-weight: 900;
            color: var(--primary-color);
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -2px;
            text-shadow: 4px 4px 0px var(--primary-light);
        }

        .error-title {
            font-size: 28px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 15px;
        }

        .error-desc {
            font-size: 16px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* Buttons */
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(182, 141, 64, 0.2);
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(182, 141, 64, 0.3);
        }

        .btn-secondary {
            background-color: var(--bg-color);
            color: var(--text-dark);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background-color: #e2e8f0;
            transform: translateY(-3px);
        }

        /* ================= STRICT MOBILE RESPONSIVENESS ================= */
        
        /* Tablets (max-width: 768px) */
        @media (max-width: 768px) {
            .error-container {
                padding: 50px 30px;
            }
            .error-code {
                font-size: 80px;
            }
            .error-title {
                font-size: 24px;
            }
            .bg-icon {
                font-size: 40vh;
            }
        }

        /* Mobile Phones (max-width: 480px) */
        @media (max-width: 480px) {
            .error-container {
                padding: 40px 20px;
                border-radius: 16px;
            }
            
            .error-icon-wrapper {
                width: 80px;
                height: 80px;
                margin-bottom: 20px;
            }
            .error-icon-wrapper i {
                font-size: 30px;
            }

            .error-code {
                font-size: 65px;
                text-shadow: 3px 3px 0px var(--primary-light);
            }
            
            .error-title {
                font-size: 22px;
            }
            
            .error-desc {
                font-size: 14px;
                margin-bottom: 25px;
            }

            /* Stack buttons vertically on small screens */
            .action-buttons {
                flex-direction: column;
                gap: 12px;
            }

            .btn {
                width: 100%;
                padding: 14px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>

<body>

    <!-- Background Decorative Icon -->
    <i class="fa-solid fa-gavel bg-icon"></i>

    <!-- 404 Content Container -->
    <div class="error-container">
        
        <div class="error-icon-wrapper">
            <i class="fa-solid fa-file-circle-xmark"></i>
        </div>

        <h1 class="error-code">404</h1>
        <h2 class="error-title">Objection! Page Not Found</h2>
        
        <p class="error-desc">
            The legal document or page you are looking for is missing from our records. It might have been moved, deleted, or never existed in the first place.
        </p>

        <div class="action-buttons">
            <!-- Go Back Button (Uses JS to return to previous page) -->
            <button class="btn btn-secondary" onclick="window.history.back();">
                <i class="fa-solid fa-arrow-left"></i> Go Back
            </button>
            
            <!-- Home Button -->
            <a href="index.html" class="btn btn-primary">
                <i class="fa-solid fa-house"></i> Return to Home
            </a>
        </div>

    </div>

</body>

</html>
